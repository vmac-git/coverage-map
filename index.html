<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roaming Map | Acceleronix LATAM</title>
    <link rel="icon" type="image/x-icon" href="https://www.acceleronix.io/wp-content/uploads/2025/08/acc-favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-mesh min-h-screen text-slate-800 pb-20">

    <div id="loader-overlay" class="flex">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-bold text-indigo-600 animate-pulse uppercase tracking-widest">Synchronizing Network Data...</p>
    </div>

    <div class="container mx-auto max-w-6xl p-6">
        
        <header class="text-center mt-12 mb-16">
            <img src="https://www.acceleronix.io/wp-content/themes/acceleronix-en/images/logo.svg" alt="Logo" class="mx-auto h-10 w-auto mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter text-slate-900 uppercase">Roaming<span class="text-indigo-600">Map</span></h1>
            <p class="text-slate-400 text-sm font-medium italic mt-2 tracking-wide">Acceleronix LATAM Partnership Coverage</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            
            <div class="lg:col-span-2 glass-card p-4 rounded-[2.5rem] shadow-sm transition-all">
                <div id="map-container" class="w-full bg-slate-50/50 rounded-[2rem] overflow-hidden">
                    </div>
            </div>

            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-8 rounded-[2.5rem] shadow-sm min-h-[400px] flex flex-col">
                    <h2 class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-indigo-600 rounded-full animate-ping"></span>
                        Coverage Details
                    </h2>
                    
                    <div id="tooltip" class="flex-grow">
                        <div class="flex flex-col items-center justify-center h-full text-center space-y-4 py-10">
                            <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-300">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" />
                                </svg>
                            </div>
                            <p class="text-slate-400 font-bold italic text-sm">Select a highlighted country <br> to view partner assets.</p>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-[2rem] text-[10px] font-bold text-slate-400 uppercase tracking-widest flex justify-between items-center">
                    <span>Active Partnership</span>
                    <div class="flex gap-1">
                        <div class="w-3 h-3 bg-indigo-600/20 rounded-sm"></div>
                        <div class="w-3 h-3 bg-indigo-600/50 rounded-sm"></div>
                        <div class="w-3 h-3 bg-indigo-600 rounded-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
