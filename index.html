<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Cobertura - Américas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <h1>Mapa de Cobertura</h1>
        <div id="map-container" class="glass-card">
            <svg id="americas-map" viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
                <path id="canada" title="Canada" d="..." /> <path id="united_states" title="United States" d="..." />
                <path id="mexico" title="Mexico" d="..." />
                
                <path id="guatemala" title="Guatemala" d="..." />
                <path id="honduras" title="Honduras" d="..." />
                <path id="el_salvador" title="El Salvador" d="..." />
                <path id="nicaragua" title="Nicaragua" d="..." />
                <path id="costa_rica" title="Costa Rica" d="..." />
                <path id="panama" title="Panama" d="..." />
                <path id="cuba" title="Cuba" d="..." />
                <path id="dominican_republic" title="Dominican Republic" d="..." />
                
                <path id="colombia" title="Colombia" d="..." />
                <path id="venezuela" title="Venezuela" d="..." />
                <path id="ecuador" title="Ecuador" d="..." />
                <path id="peru" title="Peru" d="..." />
                <path id="brazil" title="Brazil" d="..." />
                <path id="bolivia" title="Bolivia" d="..." />
                <path id="paraguay" title="Paraguay" d="..." />
                <path id="chile" title="Chile" d="..." />
                <path id="argentina" title="Argentina" d="..." />
                <path id="uruguay" title="Uruguay" d="..." />
            </svg>
        </div>
        <div id="tooltip" class="glass-card">Passe o mouse sobre um país</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
