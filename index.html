<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roaming Hub | Acceleronix LATAM</title>
    <link rel="icon" type="image/x-icon" href="https://www.acceleronix.io/wp-content/uploads/2025/08/acc-favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-mesh min-h-screen text-slate-800 overflow-hidden">

    <div id="loader-overlay">
        <div class="loader-spin"></div>
        <p class="mt-4 text-[10px] font-black text-indigo-600 animate-pulse uppercase tracking-[0.2em]">Synchronizing Network Data</p>
    </div>

    <div class="h-screen flex flex-col p-4 lg:p-8">
        
        <header class="flex justify-between items-center mb-6 px-4">
            <div class="flex items-center gap-4">
                <img src="https://www.acceleronix.io/wp-content/themes/acceleronix-en/images/logo.svg" alt="Logo" class="h-8 w-auto">
                <div class="h-6 w-[1px] bg-slate-300"></div>
                <h1 class="text-xl font-black italic tracking-tighter text-slate-900 uppercase">Roaming<span class="text-indigo-600">Map</span></h1>
            </div>
            <p class="hidden md:block text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">Acceleronix LATAM Team Central</p>
        </header>

        <div class="flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
            
            <div class="lg:col-span-8 glass-card rounded-[2.5rem] p-6 flex items-center justify-center relative overflow-hidden shadow-sm">
                <div id="map-container" class="w-full h-full flex items-center justify-center">
                    </div>
                
                <div class="absolute bottom-6 left-6 flex gap-4 items-center bg-white/50 backdrop-blur-md p-3 rounded-2xl border border-white/50 text-[9px] font-bold uppercase tracking-widest text-slate-500">
                    <div class="flex items-center gap-1.5">
                        <span class="w-3 h-3 bg-indigo-600 rounded-full shadow-[0_0_10px_rgba(79,70,229,0.4)]"></span> Active Partner
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-3 h-3 bg-slate-200 rounded-full"></span> No Coverage
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-6 overflow-hidden">
                <div class="glass-card rounded-[2.5rem] p-8 flex flex-col h-full overflow-hidden shadow-sm border-indigo-100/50">
                    <h2 class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.3em] mb-8 flex items-center gap-3">
                        <span class="flex h-2 w-2 rounded-full bg-indigo-600"></span>
                        Asset Intelligence
                    </h2>
                    
                    <div id="tooltip" class="flex-grow overflow-y-auto pr-2 custom-scrollbar">
                        <div class="h-full flex flex-col items-center justify-center text-center space-y-6 opacity-60">
                            <div class="w-20 h-20 bg-slate-100 rounded-[2rem] rotate-3 flex items-center justify-center text-slate-400 border border-slate-200">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A2 2 0 013 15.488V5.512a2 2 0 011.553-1.954L10 1.25l6.553 3.256A2 2 0 0118 6.464V16.5c0 1.105-.895 2-2 2h-1l-6 1.5z" />
                                </svg>
                            </div>
                            <div>
                                <p class="text-slate-900 font-black uppercase text-xs tracking-tighter">No Country Selected</p>
                                <p class="text-slate-400 font-medium text-[10px] mt-1 italic">Click on a highlighted region <br> to fetch partner nodes.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
